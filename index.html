<!DOCTYPE html>
<html class="dark" lang="fr">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover" name="viewport"/>
    <script src="tailwind.js"></script>
    <script src="html5-qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&family=Inter:wght@400;900&display=swap" rel="stylesheet"/>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="IMG_20260413_130653.png">
    <meta name="theme-color" content="#EAB308">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <script id="tailwind-config">
      tailwind.config = {
        theme: {
          extend: { 
            colors: { "primary": "#eaea00", "dark-bg": "#000000" },
            fontFamily: { mono: ['"JetBrains Mono"', 'monospace'], sans: ['Inter', 'sans-serif'] }
          },
        },
      }
    </script>
    <style>
        body { height: 100svh; margin: 0; padding: 0; overflow: hidden; display: flex; flex-direction: column; background: #000000; color: #ffffff; font-family: 'Inter', sans-serif; }
        #view-scanner { flex: 1; position: relative; width: 100%; overflow: hidden; }
        .scan-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 400px; height: 160px; border: 1px solid rgba(234, 234, 0, 0.2); z-index: 20; pointer-events: none; }
        .corner { position: absolute; width: 30px; height: 30px; border: 5px solid #eaea00; }
        .top-l { top: -5px; left: -5px; border-right: 0; border-bottom: 0; }
        .top-r { top: -5px; right: -5px; border-left: 0; border-bottom: 0; }
        .bot-l { bottom: -5px; left: -5px; border-right: 0; border-top: 0; }
        .bot-r { bottom: -5px; right: -5px; border-left: 0; border-top: 0; }
        .scan-line { position: absolute; width: 100%; height: 3px; background: #eaea00; box-shadow: 0 0 20px #eaea00; top: 0; animation: scan 2s linear infinite; opacity: 0.8; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        .editable-cell { border-bottom: 1px dashed #444; min-width: 50px; padding: 6px; font-size: 18px; transition: all 0.2s; }
        .editable-cell:focus { outline: none; border-bottom: 2px solid #eaea00; background: rgba(234,234,0,0.15); }
        .active-nav { color: #eaea00 !important; border-top: 3px solid #eaea00; }
        .hidden { display: none !important; }
    </style>
</head>
<body onload="initApp()">

    <div class="w-full max-sm:max-w-xs text-center">

        <div id="login-form" class="space-y-4">
            <input type="text" id="login-id"autocapitalize="characters" class="w-full bg-zinc-900 border-2 border-zinc-800 p-5 rounded-xl outline-none focus:border-primary text-white font-bold uppercase text-center" placeholder="ID MATRICULE">
            <input type="password" id="login-pass" class="w-full bg-zinc-900 border-2 border-zinc-800 p-5 rounded-xl outline-none focus:border-primary text-white font-bold text-center" placeholder="MOT DE PASSE">
            <button onclick="login()" class="w-full mt-4 bg-primary text-black font-[900] uppercase py-6 rounded-xl tracking-widest text-lg">Se Connecter</button>
            <button onclick="toggleAuth(true)" class="mt-4 text-zinc-500 underline text-sm uppercase font-bold">Créer un compte</button>

        <div id="signup-form" class="hidden space-y-3">
            <input type="text" id="reg-nom" class="w-full bg-zinc-900 border-2 border-zinc-800 p-4 rounded-xl outline-none focus:border-primary text-white font-bold uppercase text-center" placeholder="NOM">
            <input type="text" id="reg-prenom" class="w-full bg-zinc-900 border-2 border-zinc-800 p-4 rounded-xl outline-none focus:border-primary text-white font-bold uppercase text-center" placeholder="PRÉNOM">
            <input type="text" id="reg-id" class="w-full bg-zinc-900 border-2 border-zinc-800 p-4 rounded-xl outline-none focus:border-primary text-white font-bold uppercase text-center" placeholder="ID MATRICULE">
            <input type="password" id="reg-pass" class="w-full bg-zinc-900 border-2 border-zinc-800 p-4 rounded-xl outline-none focus:border-primary text-white font-bold text-center" placeholder="MOT DE PASSE">
            <button onclick="register()" class="w-full mt-4 bg-primary text-black font-[900] uppercase py-6 rounded-xl tracking-widest text-lg">Valider</button>

        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
    </svg>
</button>
        <button onclick="toggleView('scanner')" class="text-primary hover:scale-110 transition-transform">
            <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h3m-3-3H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        </button>

        <button onclick="logoutIdentity()" class="text-red-600 hover:scale-110 transition-transform">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>

                <button onclick="ajouterManuellement()" class="bg-blue-600 px-3 py-1 rounded font-black text-[18px] uppercase text-white italic">+ Manuel</button>
                <button onclick="clearAllLogs()" class="bg-red-900/20 border border-red-500/30 text-red-500 px-3 py-1 rounded font-black text-[18px] uppercase italic">Purger</button>

    <div class="px-8 py-4 bg-black border-t border-zinc-900/50">

        <svg class="w-8 h-8 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h3m-3-3H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <span class="text-[16px] font-black uppercase tracking-widest">Scanner</span>
    </button>
    <button onclick="toggleView('history')" id="nav-history" class="text-white/20 flex flex-col items-center p-2 w-1/2">
        <svg class="w-8 h-8 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2 1 3 3 3h10c2 0 3-1 3-3V7c0-2-1-3-3-3H7C5 4 4 5 4 7z"></path></svg>
        <span class="text-[16px] font-black uppercase tracking-widest">Mémoire</span>
    </button>
</nav>

<div id="modal-saisie" class="hidden fixed inset-0 bg-black/80 z-[300] flex items-center justify-center p-4">
    <div class="bg-white rounded-sm w-full max-w-sm overflow-hidden shadow-2xl">
        <div class="p-6">
            <h3 class="text-zinc-900 text-xl font-bold mb-4">SAISIE MANUELLE VIS</h3>
            <div class="relative border-b-2 border-sky-500">
                <input type="text" id="input-vis" 
                       class="w-full py-2 text-xl text-zinc-800 outline-none uppercase" 
                       placeholder="Ex: T5071035"
                       oninput="this.value = this.value.toUpperCase()"
                       autocapitalize="characters">
            </div>
        </div>
        <div class="flex justify-end gap-6 p-4 bg-white">
            <button onclick="fermerSaisie()" class="text-sky-600 font-bold uppercase tracking-wide">Annuler</button>
            <button onclick="validerSaisie()" class="text-sky-600 font-bold uppercase tracking-wide">Valider</button>
        </div>
    </div>
</div>

<script>
    const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbwsFDUIgEsiQRo1R2HIiu1cGi-wH_wdJqmF4uTw5iOkGfWxJdpab96XZRurb6MP0L4/exec";
    let html5QrCode;
    let isProcessing = false;
    let logs = JSON.parse(localStorage.getItem('lumen_logs')) || [];
    let audioCtx = null;
    let videoStream = null;

   function initApp() {
    const user = JSON.parse(localStorage.getItem('StellantisUser'));
    
    if (user) {
        // Mode normal : Utilisateur connecté
        document.getElementById('identity-screen').classList.add('hidden');
        document.getElementById('display-name').innerText = user.prenom + " " + user.nom;
        // CORRECTION ICI (Ajout des backticks) :
        document.getElementById('display-id').innerText = `ID: ${user.id}`;
        renderTable(); 
        startScanner();
    } else if (!navigator.onLine) {
        // MODE SECOURS : Pas d'internet et pas de session
        document.getElementById('identity-screen').classList.add('hidden');
        document.getElementById('display-name').innerText = "MODE HORS-LIGNE";
        document.getElementById('display-id').innerText = "ID: TEMP";
        renderTable(); 
        startScanner();
        alert("Attention : Mode secours sans connexion. Connectez-vous dès que possible.");
    }
}

   async function login() {
        const id = document.getElementById('login-id').value.trim().toUpperCase();
        const pass = document.getElementById('login-pass').value;
        
        if (!id || !pass) return alert("REMPLIR TOUS LES CHAMPS");

        // GESTION HORS LIGNE
        if (!navigator.onLine) {
            const savedUser = JSON.parse(localStorage.getItem('StellantisUser'));
            if (savedUser && savedUser.id === id) {
                alert("Mode hors-ligne activé");
                initApp(); 
                return;
            } else {
                alert("Première connexion requise avec Internet.");
                return;
            }
        }

        // GESTION EN LIGNE
        try {
            // AJOUT DES BACKTICKS ICI :
            const res = await fetch(`${GOOGLE_URL}?action=login&id=${id}&pass=${pass}`);
            const data = await res.json();
            if (data.status === 'active') {
                localStorage.setItem('StellantisUser', JSON.stringify({id: id, nom: data.nom, prenom: data.prenom}));
                location.reload();
            } else if (data.status === 'blocked') {
                alert("🛑 ACCÈS REFUSÉ");
            } else {
                alert("❌ Identifiants incorrects.");
            }
        } catch(e) { 
            alert("⚠️ Erreur serveur."); 
        }
    } 
    // Fin de login
    async function register() {
        const n = document.getElementById('reg-nom').value.trim().toUpperCase();
        const p = document.getElementById('reg-prenom').value.trim().toUpperCase();
        const i = document.getElementById('reg-id').value.trim().toUpperCase();
        const pass = document.getElementById('reg-pass').value;
        if(!n || !p || !i || !pass) return alert("CHAMPS OBLIGATOIRES");
        try {
            const res = await fetch(`${GOOGLE_URL}?action=register&nom=${n}&prenom=${p}&id=${i}&pass=${pass}`);
            const data = await res.json();
            if(data.status === "success") { alert("COMPTE CRÉÉ !"); toggleAuth(false); }
            else if(data.status === "exists") alert("ID EXISTE DÉJÀ");
        } catch(e) { alert("ERREUR SERVEUR"); }
    }

    function toggleAuth(showSignup) {
        document.getElementById('login-form').classList.toggle('hidden', showSignup);
        document.getElementById('signup-form').classList.toggle('hidden', !showSignup);
    }

    function logoutIdentity() { 
    if(confirm("Se déconnecter de la session ?")) { 
        localStorage.removeItem('StellantisUser'); 
        // Si on a internet, on recharge pour revenir au login
        if (navigator.onLine) {
            location.reload(); 
        } else {
            // Hors-ligne, on reste sur l'app mais en mode TEMP
            alert("Déconnecté. L'app reste active en mode secours.");
            initApp(); 
        }
    } 
}
 
    async function startScanner() {
    alert("Le code se lance !");

    // 1. Demander la permission caméra EXPLICITEMENT
    try {
        await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
    } catch (err) {
        alert("Permission caméra refusée. Veuillez l'autoriser dans les paramètres.");
        console.error("Permission refusée :", err);
        return; // On arrête si refusé
    }

    // 2. Nettoyer toute instance existante
    if (html5QrCode) {
        try {
            await html5QrCode.stop();
        } catch (err) {
            console.log("Nettoyage scanner...");
        }
    }

    html5QrCode = new Html5QrCode("reader");
    const config = { 
        fps: 20, 
        qrbox: { width: 400, height: 160 },
        aspectRatio: 1.0
    };

    // 3. Lancement du scanner
    html5QrCode.start(
        { facingMode: "environment" }, 
        config, 
        (decodedText) => {
            if (isProcessing) return;
            
            const cleanText = decodedText.trim().toUpperCase();
            
            if (/^[A-Z][0-9]{7}$/.test(cleanText)) {
                isProcessing = true;
                playScanSound('success');
                addLogEntry(cleanText); 
                
                html5QrCode.pause(true);
                setTimeout(() => {
                    isProcessing = false;
                    html5QrCode.resume();
                }, 2000);
            }
        }
    ).catch(err => {
        console.error("Erreur Caméra : ", err);
        setTimeout(startScanner, 1000);
    });
    }

    function ajouterManuellement() {
        const modal = document.getElementById('modal-saisie');
        const input = document.getElementById('input-vis');
        input.value = ""; 
        modal.classList.remove('hidden');
        input.focus();
    }

    function fermerSaisie() {
        document.getElementById('modal-saisie').classList.add('hidden');
    }

    function validerSaisie() {
    const input = document.getElementById('input-vis');
    const codeClean = input.value.trim().toUpperCase();

    if (/^[A-Z][0-9]{7}$/.test(codeClean)) {
        try {
            // 1. On joue le son
            playScanSound(); 

            // 2. On ajoute l'entrée
            addLogEntry(codeClean);
            
            // 3. FORCE LA FERMETURE (même si addLogEntry a un petit bug)
            document.getElementById('modal-saisie').classList.add('hidden');
            
            // 4. Vide le champ
            input.value = "";
            
            console.log("Succès : Enregistré et Fermé");
        } catch (err) {
            // En cas d'erreur interne, on force quand même la fermeture
            document.getElementById('modal-saisie').classList.add('hidden');
            console.error("Erreur lors de la validation:", err);
        }
    } else {
        alert("Format invalide ! (Ex: T5071035)");
    }
}

    document.getElementById('input-vis').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') { validerSaisie(); }
    });

    function addLogEntry(codeValue) {
    // 1. Récupérer l'utilisateur qui s'est connecté sur CE téléphone
    const userData = localStorage.getItem('StellantisUser');
    
    // 2. Vérification de sécurité
    if (!userData) {
        alert("Erreur : Aucun opérateur connecté. Veuillez vous reconnecter.");
        location.reload(); // Force le retour à l'écran d'identité
        return;
    }

    const user = JSON.parse(userData);
    const now = new Date();
    
    // Formatage de la date (ex: 19/4) et de l'heure (ex: 14:30)
    // Remplace l'ancienne ligne dateStr par celle-ci :
const dateStr = now.toLocaleDateString('fr-FR', {
    day: '2-digit',
    month: '2-digit',
    year: '2-digit'
});
    const timeStr = now.toLocaleTimeString('fr-FR', { 
    hour: '2-digit', 
    minute: '2-digit',
    seconde: '2-digit'
});
    
    // 3. Création de l'entrée avec le BON ID (plus de "99")
    const entry = { 
        id: Date.now(), 
        op: user.id,      // Utilise l'ID de la personne connectée (ex: 55 ou 14)
        code: codeValue, 
        zone: '',         // Reste vide jusqu'à la saisie manuelle
        date: dateStr, 
        time: timeStr,
        synced: false     // Deviendra true après l'envoi Google Sheets
    };

    // 4. Mise à jour de la mémoire locale
    logs.unshift(entry);
    localStorage.setItem('lumen_logs', JSON.stringify(logs));
    
    // 5. Mise à jour visuelle
    renderTable(); 
    toggleView('history');

    // 6. Petit feedback sonore ou vibration
    // if (navigator.vibrate) navigator.vibrate(50); 
    
    // Réinitialisation du verrou de scan après 1.5 seconde
    setTimeout(() => { isProcessing = false; }, 1500);
    }
    
    async function sendToGoogle(entry) {
    // 1. Vérifie si le téléphone a internet
    if (!navigator.onLine) {
        console.warn("Mode Hors-ligne : scan stocké localement.");
        return;
    }

    // 2. Construction de l'URL avec les paramètres
    // On utilise encodeURIComponent pour éviter les erreurs avec les espaces ou caractères spéciaux
    const url = `${GOOGLE_URL}?action=saveScan` +
                `&op=${encodeURIComponent(entry.op)}` +
                `&code=${encodeURIComponent(entry.code)}` +
                `&zone=${encodeURIComponent(entry.zone)}` +
                `&date=${encodeURIComponent(entry.date)}` +
                `&time=${encodeURIComponent(entry.time)}`;

    try {
        // 3. Envoi de la requête
        const response = await fetch(url, { 
            method: 'GET',
            mode: 'cors' // Permet de communiquer avec Google
        });

        if (response.ok) {
            // 4. Si succès, on marque l'entrée comme synchronisée
            entry.synced = true;
            
            // Mise à jour du stockage local (localStorage)
            const logIndex = logs.findIndex(l => l.id === entry.id);
            if (logIndex !== -1) {
                logs[logIndex].synced = true;
                localStorage.setItem('lumen_logs', JSON.stringify(logs));
            }
            
            // Rafraîchir le tableau pour afficher le badge "SUCCESS ✅"
            renderTable();
            console.log("✅ Données envoyées à COMPTE-NAVETTE");
        }
    } catch (e) {
        console.error("❌ Erreur lors de l'envoi vers Google Sheets :", e);
    }
    }

    async function updateEntry(id, field, val) {
    const i = logs.findIndex(l => l.id === id);
    if (i !== -1) {
        logs[i][field] = val.trim().toUpperCase();
        localStorage.setItem('lumen_logs', JSON.stringify(logs));
        
        // SI on vient de modifier la 'zone' ET qu'elle n'est pas vide
        if (field === 'zone' && logs[i].zone !== "" && !logs[i].synced) {
            sendToGoogle(logs[i]);
        }
    }
    }
    
function renderTable() {
        document.getElementById('flux-title').innerText = `Flux (${logs.length})`;
        document.getElementById('history-body').innerHTML = logs.map(log => `
            <tr class="border-b border-zinc-800 ${log.synced ? 'bg-green-900/10' : ''}">
                <td class="p-3 text-white/30 text-[16px]">${log.op}</td>
                <td class="p-3 border-r border-zinc-800"><div class="editable-cell text-primary font-black" contenteditable="true" onblur="updateEntry(${log.id}, 'code', this.innerText)">${log.code}</div></td>
                <td class="p-3 border-r border-zinc-800"><div class="editable-cell text-white font-bold" contenteditable="true" onblur="updateEntry(${log.id}, 'zone', this.innerText)">${log.zone}</div></td>
                <td class="p-3 text-[16px] font-black leading-none">
                    ${log.time}<br>
                    <span class="text-[12px] ${log.synced ? 'text-green-500 font-bold' : 'text-white/20'}">
                        ${log.synced ? 'SUCCESS ✅' : log.date}
                    </span>
                </td>
               <td class="p-1">
                 <button onclick="deleteEntry(${log.id})" class="w-12 h-12 flex items-center justify-center text-red-500 text-4xl font-bold active:bg-red-500/20 rounded-full transition-colors">×</button>
                 </td>
                 </tr>
        `).join('');
    }

    function playScanSound() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.type = 'square';
        oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
        oscillator.connect(gainNode); gainNode.connect(audioCtx.destination);
        oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.1);
    }

    function toggleView(v) {
        document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden'));
        document.querySelectorAll('nav button').forEach(b => { b.classList.add('text-white/20'); b.classList.remove('active-nav'); });
        
        document.getElementById(`view-${v}`).classList.remove('hidden');
        document.getElementById(`nav-${v}`).classList.add('active-nav');

        if (v === 'scanner') {
            isProcessing = false; 
            if (html5QrCode) html5QrCode.resume();
        } else {
            if (html5QrCode) html5QrCode.pause(true);
        }
    }

    function deleteEntry(id) { 
        if(confirm("Supprimer ?")) { 
            logs = logs.filter(l => l.id !== id); 
            localStorage.setItem('lumen_logs', JSON.stringify(logs)); 
            renderTable(); 
        } 
    }

    function clearAllLogs() { if(confirm("PURGE ?")) { logs = []; localStorage.removeItem('lumen_logs'); renderTable(); } }
    
    function exportCSV() {
        if(logs.length === 0) return;
        let csv = "\uFEFFOP;CODE;ZONE;DATE;TIME\n";
        logs.forEach(l => csv += `${l.op};${l.code};${l.zone};${l.date};${l.time}\n`);
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `COMPTE_NAVETTE.csv`; link.click();
    }
        // --- SERVICE WORKER ET ONLINE CHECK ---
    window.addEventListener('online', () => {
        logs.forEach(entry => { if (!entry.synced) sendToGoogle(entry); });
    });

    if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
            .then(reg => console.log('SW Ready'))
            .catch(err => console.error('SW Error', err));
    });
    }
</script>
</body>

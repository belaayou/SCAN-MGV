<!DOCTYPE html>
<html class="dark" lang="fr">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover" name="viewport"/>
    <title>SCAN_INDUSTRIAL | Stellantis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&family=Inter:wght@400;900&display=swap" rel="stylesheet"/>
    <style>
        body { background: #000000; color: #ffffff; font-family: 'Inter', sans-serif; height: 100svh; overflow: hidden; display: flex; flex-direction: column; }
        .scan-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; height: 150px; border: 1px solid rgba(234, 234, 0, 0.4);
            z-index: 20; pointer-events: none;
        }
        .corner { position: absolute; width: 20px; height: 20px; border: 4px solid #eaea00; }
        .top-l { top: -4px; left: -4px; border-right: 0; border-bottom: 0; }
        .top-r { top: -4px; right: -4px; border-left: 0; border-bottom: 0; }
        .bot-l { bottom: -4px; left: -4px; border-right: 0; border-top: 0; }
        .bot-r { bottom: -4px; right: -4px; border-left: 0; border-top: 0; }
        .scan-line {
            position: absolute; width: 100%; height: 2px; background: #eaea00;
            box-shadow: 0 0 15px #eaea00; top: 0; animation: scan 2s linear infinite;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        .active-nav { color: #eaea00 !important; border-top: 3px solid #eaea00; }
        .editable-cell:focus { outline: none; background: rgba(234,234,0,0.1); }
    </style>
</head>
<body onload="initApp()">

<div id="identity-screen" class="fixed inset-0 bg-black z-[200] flex flex-col p-8 items-center justify-center">
    <div class="w-full max-w-xs text-center">
        <h1 class="text-[#eaea00] font-[900] text-4xl mb-8 uppercase italic">MGV CORE</h1>
        <div class="space-y-4">
            <input type="text" id="reg-name" class="w-full bg-zinc-900 border-2 border-zinc-800 p-5 rounded-xl outline-none focus:border-[#eaea00] text-white font-bold uppercase" placeholder="OPÉRATEUR">
            <input type="number" id="reg-id" class="w-full bg-zinc-900 border-2 border-zinc-800 p-5 rounded-xl outline-none focus:border-[#eaea00] text-[#eaea00] font-mono text-3xl text-center" placeholder="ID CODE">
        </div>
        <button onclick="saveIdentity()" class="w-full mt-8 bg-[#eaea00] text-black font-[900] uppercase py-6 rounded-xl tracking-widest text-lg active:scale-95 transition-transform">Activer Terminal</button>
    </div>
</div>

<header class="h-20 flex justify-between items-center px-6 shrink-0 bg-black border-b border-zinc-900">
    <div class="flex flex-col">
        <span id="display-name" class="text-xs font-[900] text-[#eaea00] uppercase tracking-widest">---</span>
        <span id="display-id" class="text-xl font-mono text-white/80 font-bold">ID: ---</span>
    </div>
    <button onclick="logoutIdentity()" class="text-red-600 p-2">
        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
    </button>
</header>

<main class="flex-1 flex flex-col relative overflow-hidden">
    <section id="view-scanner" class="view-section flex-1 relative bg-zinc-950">
        <div id="reader" class="h-full w-full"></div>
        <div class="scan-overlay">
            <div class="scan-line"></div>
            <div class="corner top-l"></div><div class="corner top-r"></div>
            <div class="corner bot-l"></div><div class="corner bot-r"></div>
        </div>
    </section>

    <section id="view-history" class="view-section hidden flex-1 p-4 overflow-y-auto bg-black">
        <div class="flex justify-between items-center mb-4">
            <h3 id="flux-title" class="text-[#eaea00] font-black uppercase italic tracking-widest text-sm">FLUX (0)</h3>
            <div class="flex gap-2">
                <button onclick="exportCSV()" class="bg-zinc-800 text-white px-4 py-2 rounded-lg font-bold text-xs">CSV</button>
                <button onclick="clearLogs()" class="bg-red-900/30 text-red-500 px-4 py-2 rounded-lg font-bold text-xs">PURGER</button>
            </div>
        </div>
        <div id="history-list" class="space-y-3 font-mono"></div>
    </section>
</main>

<nav class="h-20 bg-black border-t border-zinc-900 flex justify-around items-center pb-2">
    <button onclick="toggleView('scanner')" id="nav-scanner" class="active-nav flex flex-col items-center w-1/2 p-2">
        <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h3m-3-3H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        <span class="text-[10px] font-black uppercase">Scanner</span>
    </button>
    <button onclick="toggleView('history')" id="nav-history" class="text-white/20 flex flex-col items-center w-1/2 p-2">
        <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2 1 3 3 3h10c2 0 3-1 3-3V7c0-2-1-3-3-3H7C5 4 4 5 4 7z"/></svg>
        <span class="text-[10px] font-black uppercase">Mémoire</span>
    </button>
</nav>

<script>
    let html5QrCode;
    let logs = JSON.parse(localStorage.getItem('mgv_logs')) || [];

    function initApp() {
        const user = JSON.parse(localStorage.getItem('mgv_user'));
        if (user) {
            document.getElementById('identity-screen').style.display = 'none';
            document.getElementById('display-name').innerText = user.name;
            document.getElementById('display-id').innerText = `ID: ${user.id}`;
            renderLogs();
            startScanner();
        }
    }

    function saveIdentity() {
        const name = document.getElementById('reg-name').value;
        const id = document.getElementById('reg-id').value;
        if (name && id) {
            localStorage.setItem('mgv_user', JSON.stringify({name, id}));
            location.reload();
        } else {
            alert("Veuillez remplir tous les champs");
        }
    }

    function startScanner() {
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start(
            { facingMode: "environment" },
            { fps: 15, qrbox: { width: 280, height: 150 } },
            (decodedText) => {
                processScan(decodedText);
            }
        ).catch(err => alert("Erreur Caméra: " + err));
    }

    function processScan(code) {
        // حماية من التكرار اللحظي
        html5QrCode.pause(true);
        const user = JSON.parse(localStorage.getItem('mgv_user'));
        const now = new Date();
        const entry = {
            id: Date.now(),
            op: user.id,
            code: code,
            time: now.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit', second:'2-digit'}),
            date: now.toLocaleDateString('fr-FR')
        };
        logs.unshift(entry);
        localStorage.setItem('mgv_logs', JSON.stringify(logs));
        
        // تنبيه صوتي بسيط
        try { new AudioContext().createOscillator().start(); } catch(e){}

        renderLogs();
        toggleView('history');
        setTimeout(() => { html5QrCode.resume(); }, 2000);
    }

    function renderLogs() {
        document.getElementById('flux-title').innerText = `FLUX (${logs.length})`;
        document.getElementById('history-list').innerHTML = logs.map(log => `
            <div class="bg-zinc-900 p-4 rounded-xl border border-zinc-800 flex justify-between items-center">
                <div>
                    <div class="text-[#eaea00] font-black text-lg">${log.code}</div>
                    <div class="text-white/40 text-[10px] uppercase font-bold">${log.date} | ${log.time}</div>
                </div>
                <button onclick="deleteLog(${log.id})" class="text-red-900 font-bold text-xl px-2">×</button>
            </div>
        `).join('');
    }

    function toggleView(v) {
        document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden'));
        document.querySelectorAll('nav button').forEach(b => { b.classList.add('text-white/20'); b.classList.remove('active-nav'); });
        document.getElementById(`view-${v}`).classList.remove('hidden');
        document.getElementById(`nav-${v}`).classList.add('active-nav');
    }

    function exportCSV() {
        let csv = "OP;CODE;DATE;TIME\n";
        logs.forEach(l => csv += `${l.op};${l.code};${l.date};${l.time}\n`);
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.setAttribute('href', url);
        a.setAttribute('download', 'MGV_LOGS.csv');
        a.click();
    }

    function deleteLog(id) {
        logs = logs.filter(l => l.id !== id);
        localStorage.setItem('mgv_logs', JSON.stringify(logs));
        renderLogs();
    }

    function clearLogs() {
        if(confirm("Purger toute la mémoire ?")) {
            logs = [];
            localStorage.removeItem('mgv_logs');
            renderLogs();
        }
    }

    function logoutIdentity() {
        if(confirm("Déconnexion ?")) {
            localStorage.removeItem('mgv_user');
            location.reload();
        }
    }
</script>
</body>
</html>

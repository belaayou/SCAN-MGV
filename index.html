<!DOCTYPE html>
<html class="dark" lang="fr">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover" name="viewport"/>
    <title>SCAN_INDUSTRIAL | v7.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&family=Inter:wght@400;900&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
      tailwind.config = {
        theme: {
          extend: { 
            colors: { "primary": "#eaea00", "dark-bg": "#000000" },
            fontFamily: { mono: ['"JetBrains Mono"', 'monospace'], sans: ['Inter', 'sans-serif'] }
          },
        },
      }
    </script>
    <style>
        body {
            height: 100svh; 
            margin: 0;
            padding: 0;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            background: #000000;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
        }

        @supports not (height: 100svh) {
            body { height: 100vh; }
        }

        header, nav, .footer-lock {
            flex-shrink: 0;
        }

        #view-scanner {
            flex: 1;
            position: relative;
            width: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #reader { height: 100% !important; border: none !important; }
        #reader video { object-fit: cover !important; height: 100% !important; width: 100% !important; }

        /* Hides default library UI elements */
        #reader__status_span, #reader__dashboard, #reader img, #reader__camera_selection {
            display: none !important;
        }

        .scan-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; max-width: 400px; height: 150px; border: 1px solid rgba(234, 234, 0, 0.3);
            z-index: 20; pointer-events: none;
        }
        .corner { position: absolute; width: 25px; height: 25px; border: 4px solid #eaea00; }
        .top-l { top: -2px; left: -2px; border-right: 0; border-bottom: 0; }
        .top-r { top: -2px; right: -2px; border-left: 0; border-bottom: 0; }
        .bot-l { bottom: -2px; left: -2px; border-right: 0; border-top: 0; }
        .bot-r { bottom: -2px; right: -2px; border-left: 0; border-top: 0; }
        
        .scan-line {
            position: absolute; width: 100%; height: 2px; background: #eaea00;
            box-shadow: 0 0 15px #eaea00; top: 0; animation: scan 2s linear infinite;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        .editable-cell { border-bottom: 1px dashed #444; min-width: 50px; padding: 4px; transition: all 0.2s; }
        .editable-cell:focus { outline: none; border-bottom: 2px solid #eaea00; background: rgba(234,234,0,0.1); }
        .active-nav { color: #eaea00 !important; border-top: 3px solid #eaea00; background: rgba(234,234,0,0.05); }

        /* Force hide override for Specificity conflict */
        .view-section.hidden {
            display: none !important;
        }
    </style>
</head>
<body onload="initApp()">

<div id="identity-screen" class="fixed inset-0 bg-black z-[200] flex flex-col p-8 items-center justify-center">
    <div class="w-full max-w-xs text-center">
        <h1 class="text-primary font-[900] text-4xl tracking-tighter mb-8 uppercase italic">LUMEN CORE</h1>
        <div class="space-y-4">
            <input type="text" id="reg-name" class="w-full bg-zinc-900 border-2 border-zinc-800 p-5 rounded-xl outline-none focus:border-primary text-white font-bold uppercase text-center" placeholder="OPÉRATEUR">
            <input type="number" id="reg-id" class="w-full bg-zinc-900 border-2 border-zinc-800 p-5 rounded-xl outline-none focus:border-primary text-primary font-mono text-3xl text-center" placeholder="ID CODE">
        </div>
        <button onclick="saveIdentity()" class="w-full mt-8 bg-primary text-black font-[900] uppercase py-6 rounded-xl tracking-widest active:scale-95 transition-all">Activer Session</button>
    </div>
</div>

<header class="h-20 flex justify-between items-center px-6 bg-black border-b-2 border-zinc-900 z-50">
    <div class="flex flex-col">
        <span id="display-name" class="text-xs font-[900] tracking-widest text-primary uppercase leading-tight">---</span>
        <span id="display-id" class="text-[20px] font-mono text-white font-bold tracking-tighter italic">ID: ---</span>
    </div>
    <button onclick="logoutIdentity()" class="text-red-600 active:scale-75 transition-all">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
    </button>
</header>

<main class="flex-1 flex flex-col overflow-hidden relative">
    <section id="view-scanner" class="view-section flex-1">
        <div class="relative flex-1 bg-zinc-950 overflow-hidden">
            <div id="reader"></div>
            <div class="scan-overlay">
                <div class="scan-line"></div>
                <div class="corner top-l"></div><div class="corner top-r"></div>
                <div class="corner bot-l"></div><div class="corner bot-r"></div>
            </div>
        </div>
    </section>

    <section id="view-history" class="view-section hidden flex-1 p-2 overflow-y-auto bg-black">
        <div class="flex justify-between items-center mb-4 px-2">
            <h3 id="flux-title" class="text-primary font-[900] text-sm uppercase italic">Flux (0)</h3>
            <div class="flex gap-2">
                <button onclick="clearAllLogs()" class="bg-red-900/20 border border-red-500/30 text-red-500 px-3 py-1 rounded font-black text-xs uppercase">Purger</button>
                <button onclick="exportCSV()" class="bg-zinc-800 px-3 py-1 rounded font-black text-xs text-white uppercase">CSV</button>
            </div>
        </div>
        <div class="bg-zinc-900 rounded-xl border-2 border-zinc-800 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-zinc-800 text-[14px] text-white/40 uppercase font-black">
                        <th class="p-3">OP</th><th class="p-3">Code</th><th class="p-3">Zone</th><th class="p-3 text-right">Time</th>
                    </tr>
                </thead>
                <tbody id="history-body" class="font-mono text-[16px]"></tbody>
            </table>
        </div>
    </section>

    <div class="px-8 py-4 bg-black border-t border-zinc-900/50 footer-lock">
        <div class="w-full bg-primary text-black py-4 flex items-center justify-center rounded-2xl">
            <span class="font-[900] uppercase tracking-[0.2em] text-lg italic">STELLANTIS MGV</span>
        </div>
    </div>
</main>

<nav class="h-20 bg-black border-t-2 border-zinc-900 flex">
    <button onclick="toggleView('scanner')" id="nav-scanner" class="active-nav flex-1 flex flex-col items-center justify-center">
        <span class="text-[18px] font-black uppercase tracking-widest">Scanner</span>
    </button>
    <button onclick="toggleView('history')" id="nav-history" class="text-white/20 flex-1 flex flex-col items-center justify-center">
        <span class="text-[18px] font-black uppercase tracking-widest">Mémoire</span>
    </button>
</nav>

<script>
    window.addEventListener('resize', () => {
        document.body.style.height = window.innerHeight + 'px';
    });

    let html5QrCode;
    let isProcessing = false;
    let logs = JSON.parse(localStorage.getItem('lumen_logs')) || [];

    function initApp() {
        const user = JSON.parse(localStorage.getItem('lumen_user'));
        if (user) {
            document.getElementById('identity-screen').classList.add('hidden');
            document.getElementById('display-name').innerText = user.name;
            document.getElementById('display-id').innerText = `ID: ${user.id}`;
            renderTable(); startScanner();
        }
        document.body.style.height = window.innerHeight + 'px';
    }

    function saveIdentity() {
        const name = document.getElementById('reg-name').value;
        const id = document.getElementById('reg-id').value;
        if (name && id) { localStorage.setItem('lumen_user', JSON.stringify({name, id})); location.reload(); }
    }

    function startScanner() {
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: { width: 300, height: 150 } }, (text) => {
            if (isProcessing) return;
            isProcessing = true;
            if(navigator.vibrate) navigator.vibrate(50);
            addLogEntry(text);
        }).catch(err => console.error(err));
    }

    function addLogEntry(codeValue) {
        const user = JSON.parse(localStorage.getItem('lumen_user'));
        const now = new Date();
        const entry = {
            id: Date.now(),
            op: user.id,
            code: codeValue,
            zone: '---',
            date: `${now.getDate()}/${now.getMonth() + 1}`,
            time: now.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'})
        };
        logs.unshift(entry);
        localStorage.setItem('lumen_logs', JSON.stringify(logs));
        renderTable();
        toggleView('history');
    }

    function renderTable() {
        document.getElementById('flux-title').innerText = `Flux (${logs.length})`;
        document.getElementById('history-body').innerHTML = logs.map(log => `
            <tr class="border-b border-zinc-800">
                <td class="p-3 text-zinc-500 font-bold">${log.op}</td>
                <td class="p-3 text-primary font-black uppercase">${log.code}</td>
                <td class="p-3"><div class="editable-cell text-white uppercase" contenteditable="true" onblur="updateEntry(${log.id}, this.innerText)">${log.zone}</div></td>
                <td class="p-3 text-right font-black text-xs">${log.time}<br><span class="text-[10px] text-zinc-600">${log.date}</span></td>
            </tr>
        `).join('');
    }

    function updateEntry(id, val) {
        const i = logs.findIndex(l => l.id === id);
        if (i !== -1) { logs[i].zone = val.trim() || '---'; localStorage.setItem('lumen_logs', JSON.stringify(logs)); }
    }

    function clearAllLogs() { if(confirm("Vider la mémoire ?")) { logs = []; localStorage.removeItem('lumen_logs'); renderTable(); } }

    function toggleView(v) {
        document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden'));
        document.querySelectorAll('nav button').forEach(b => { b.classList.add('text-white/20'); b.classList.remove('active-nav'); });
        document.getElementById(`view-${v}`).classList.remove('hidden');
        document.getElementById(`nav-${v}`).classList.add('active-nav');
        if (v === 'scanner' && html5QrCode) { isProcessing = false; html5QrCode.resume(); }
    }

    function exportCSV() {
        if(!logs.length) return;
        let csv = "\uFEFFOP;CODE;ZONE;DATE;TIME\n";
        logs.forEach(l => csv += `${l.op};${l.code};${l.zone};${l.date};${l.time}\n`);
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
        const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "LUMEN_DATA.csv"; a.click();
    }

    function logoutIdentity() { if(confirm("Quitter la session ?")) { localStorage.removeItem('lumen_user'); location.reload(); } }
</script>
</body>
    </html>

<!DOCTYPE html>

<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover" name="viewport"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&family=Inter:wght@400;900&display=swap" rel="stylesheet"/>  
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="IMG_20260413_130653.png">

    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <script id="tailwind-config">
      tailwind.config = {
        theme: {
          extend: { 
            colors: { "primary": "#eaea00", "dark-bg": "#000000" },
            fontFamily: { mono: ['"JetBrains Mono"', 'monospace'], sans: ['Inter', 'sans-serif'] }
          },
        },

    <style>
        body { height: 100svh; margin: 0; padding: 0; overflow: hidden; display: flex; flex-direction: column; background: #000000; color: #ffffff; font-family: 'Inter', sans-serif; }
        #view-scanner { flex: 1; position: relative; width: 100%; overflow: hidden; }
        .scan-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 460px; height: 360px; border: 1px solid rgba(234, 234, 0, 0.2); z-index: 20; pointer-events: none; }
        .corner { position: absolute; width: 30px; height: 30px; border: 5px solid #eaea00; }
        .top-l { top: -5px; left: -5px; border-right: 0; border-bottom: 0; }
        .top-r { top: -5px; right: -5px; border-left: 0; border-bottom: 0; }
        .bot-l { bottom: -5px; left: -5px; border-right: 0; border-top: 0; }
        .bot-r { bottom: -5px; right: -5px; border-left: 0; border-top: 0; }
        .scan-line { position: absolute; width: 100%; height: 3px; background: #eaea00; box-shadow: 0 0 20px #eaea00; top: 0; animation: scan 3s linear infinite; opacity: 0.8; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        .editable-cell { border-bottom: 1px dashed #444; min-width: 50px; padding: 6px; font-size: 18px; transition: all 0.2s; }
        .editable-cell:focus { outline: none; border-bottom: 2px solid #eaea00; background: rgba(234,234,0,0.15); }
        .active-nav { color: #eaea00 !important; border-top: 3px solid #eaea00; }
        .hidden { display: none !important; }
    </style>
</head>

<div id="modal-saisie" class="hidden fixed inset-0 bg-black/90 z-[300] flex items-center justify-center p-4 backdrop-blur-md">

                    class="flex-1 py-7 text-zinc-400 font-black uppercase tracking-widest text-lg active:bg-zinc-800 transition-colors">

            </button>

<!-- MODAL RECHERCHE -->
<div id="modal-recherche" class="hidden fixed inset-0 bg-black/90 z-[300] flex items-center justify-center p-4 backdrop-blur-md">
    <div class="bg-zinc-900 border-4 border-primary rounded-3xl w-full max-w-sm overflow-hidden shadow-[0_0_30px_rgba(234,234,0,0.2)]">
        <div class="p-8">
            <h3 class="text-primary text-xl font-[900] mb-8 tracking-widest uppercase italic text-center">
                RECHERCHE VIS
            </h3>
            <div class="relative">
                <input type="text" id="search-input"
                       class="w-full bg-black border-b-4 border-zinc-700 py-5 text-4xl text-white outline-none focus:border-primary transition-colors font-mono uppercase text-center"
                       placeholder="CODE VIS"
                       oninput="this.value = this.value.toUpperCase()"
                       autocomplete="off" autocorrect="off" spellcheck="false">
            </div>
        </div>
        <div class="flex border-t-4 border-zinc-800">
            <button onclick="fermerRecherche()"
                    class="flex-1 py-7 text-zinc-400 font-black uppercase tracking-widest text-lg active:bg-zinc-800 transition-colors">
                Annuler
            </button>
            <button onclick="lancerRecherche()"
                    class="flex-1 py-7 bg-primary text-black font-[900] uppercase tracking-widest text-xl active:bg-yellow-500 transition-colors">
                Rechercher
            </button>

<script>
    const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbwsFDUIgEsiQRo1R2HIiu1cGi-wH_wdJqmF4uTw5iOkGfWxJdpab96XZRurb6MP0L4/exec";
    let html5QrCode;
    let isProcessing = false;
    let logs = JSON.parse(localStorage.getItem('lumen_logs')) || [];
    let audioCtx = null;
    let videoStream = null;

   function initApp() {
    const user = JSON.parse(localStorage.getItem('StellantisUser'));
    if (user) {
        document.getElementById('identity-screen').classList.add('hidden');
        document.getElementById('display-name').innerText = user.prenom + " " + user.nom;
        document.getElementById('display-id').innerText = `ID: ${user.id}`;
        renderTable();
        startScanner();
    } else if (!navigator.onLine) {
        // ✅ Ouverture silencieuse sans alert
        localStorage.setItem('StellantisUser', JSON.stringify({
            id: 'TEMP', nom: 'HORS-LIGNE', prenom: 'MODE'
        }));
        document.getElementById('identity-screen').classList.add('hidden');
        document.getElementById('display-name').innerText = "MODE HORS-LIGNE";
        document.getElementById('display-id').innerText = "ID: TEMP";
        renderTable();
        startScanner();
    }
}

async function login() {
    const id = document.getElementById('login-id').value.trim().toUpperCase();
    const pass = document.getElementById('login-pass').value;
    if (!id || !pass) return alert("REMPLIR TOUS LES CHAMPS");

    if (!navigator.onLine) {
        // ✅ Hors-ligne : on vérifie dans le cache local
        const cachedUsers = JSON.parse(localStorage.getItem('StellantisUsers_cache') || '[]');
        const found = cachedUsers.find(u => u.id === id && u.pass === pass);
        if (found) {
            localStorage.setItem('StellantisUser', JSON.stringify({
                id: found.id, nom: found.nom, prenom: found.prenom
            }));
            initApp();
        } else {
            alert("❌ ID ou mot de passe incorrect (mode hors-ligne).");
        }
        return;
    }

    try {
        const res = await fetch(`${GOOGLE_URL}?action=login&id=${id}&pass=${pass}`);
        const data = await res.json();
        if (data.status === 'active') {
            // ✅ On sauvegarde aussi dans le cache local pour usage hors-ligne
            let cachedUsers = JSON.parse(localStorage.getItem('StellantisUsers_cache') || '[]');
            cachedUsers = cachedUsers.filter(u => u.id !== id); // évite doublons
            cachedUsers.push({ id, pass, nom: data.nom, prenom: data.prenom });
            localStorage.setItem('StellantisUsers_cache', JSON.stringify(cachedUsers));

            localStorage.setItem('StellantisUser', JSON.stringify({
                id: id, nom: data.nom, prenom: data.prenom
            }));
            location.reload();
        } else if (data.status === 'blocked') { alert("🛑 ACCÈS REFUSÉ"); }
        else { alert("❌ Identifiants incorrects."); }
    } catch(e) { alert("⚠️ Erreur serveur."); }
}

async function register() {
    const n = document.getElementById('reg-nom').value.trim().toUpperCase();
    const p = document.getElementById('reg-prenom').value.trim().toUpperCase();
    const i = document.getElementById('reg-id').value.trim().toUpperCase();
    const pass = document.getElementById('reg-pass').value;
    if (!n || !p || !i || !pass) return alert("CHAMPS OBLIGATOIRES");
    try {
        const res = await fetch(`${GOOGLE_URL}?action=register&nom=${n}&prenom=${p}&id=${i}&pass=${pass}`);
        const data = await res.json();
        if (data.status === "success") { alert("COMPTE CRÉÉ !"); toggleAuth(false); }
        else if (data.status === "exists") alert("ID EXISTE DÉJÀ");
    } catch(e) { alert("ERREUR SERVEUR"); }
}

function toggleAuth(showSignup) {
    document.getElementById('login-form').classList.toggle('hidden', showSignup);
    document.getElementById('signup-form').classList.toggle('hidden', !showSignup);
}

function logoutIdentity() {
    if (confirm("Se déconnecter ?")) {
        localStorage.removeItem('StellantisUser');
        // ✅ Affiche l'écran login sans recharger la page
        document.getElementById('login-id').value = "";
        document.getElementById('login-pass').value = "";
        document.getElementById('identity-screen').classList.remove('hidden');
        document.getElementById('display-name').innerText = "---";
        document.getElementById('display-id').innerText = "ID: ---";
        if (html5QrCode) html5QrCode.pause(true);
    }
}

function startScanner() {
    if (!html5QrCode) {
        html5QrCode = new Html5Qrcode("reader");
    }
    html5QrCode.start(
        { facingMode: "environment" },
        { fps: 20, qrbox: undefined },
        (decodedText) => {
            if (isProcessing) return;
            const cleanText = decodedText.trim().toUpperCase();
            if (/^[A-Z][0-9]{7}$/.test(cleanText)) {
                isProcessing = true;
                html5QrCode.pause(true);
                playScanSound();
                addLogEntry(cleanText);
            }
        }
    ).then(() => {
        videoStream = html5QrCode.getRunningTrack();
    }).catch(err => console.error("Erreur Camera:", err));
}

function ajouterManuellement() {
    const input = document.getElementById('input-vis');
    input.value = "";
    document.getElementById('modal-saisie').classList.remove('hidden');
    input.focus();
}

function fermerSaisie() {
    document.getElementById('modal-saisie').classList.add('hidden');
}
function toggleSearch() {
    document.getElementById('search-input').value = '';
    document.getElementById('modal-recherche').classList.remove('hidden');
    setTimeout(() => document.getElementById('search-input').focus(), 100);
}

function fermerRecherche() {
    document.getElementById('modal-recherche').classList.add('hidden');
    // ✅ Retirer tous les highlights
    document.querySelectorAll('tr.highlight-found').forEach(tr => {
        tr.classList.remove('highlight-found');
        tr.style.background = '';
        tr.style.outline = '';
    });
}

function lancerRecherche() {
    const q = document.getElementById('search-input').value.trim().toUpperCase();
    if (!q) return;

    document.getElementById('modal-recherche').classList.add('hidden');
    toggleView('history');

    // ✅ Chercher dans logs directement
    const indices = [];
    logs.forEach((log, index) => {
        if (log.code.includes(q) || log.zone.includes(q) || log.op.includes(q)) {
            indices.push(index);
        }
    });

    if (indices.length === 0) {
        alert(`❌ "${q}" introuvable dans le flux.`);
        return;
    }

    // ✅ Render avec highlight intégré directement dans le HTML
    document.getElementById('history-body').innerHTML = logs.map((log, index) => {
        const isMatch = indices.includes(index);
        return `
      <tr class="border-b border-zinc-800" 
    id="row-${log.id}"
    style="${isMatch ? 'background:rgba(234,234,0,0.25); box-shadow: inset 0 0 0 3px #eaea00;' : log.synced ? 'background:rgba(0,255,0,0.05)' : ''}">
    
    <td class="p-3 text-[16px]" 
        style="${isMatch ? 'color:#eaea00; border-bottom: 3px solid #eaea00;' : 'color:rgba(255,255,255,0.3)'}">
        ${log.op}
    </td>
    
    <td class="p-3 border-r border-zinc-800"
        style="${isMatch ? 'border-bottom: 3px solid #eaea00;' : ''}">
        <div class="editable-cell font-black" 
             style="text-transform:uppercase; color:${isMatch ? '#ffffff' : '#eaea00'}"
             contenteditable="true" 
             onblur="updateEntry(${log.id}, 'code', this.innerText)">${log.code}</div>
    </td>
    
    <td class="p-3 border-r border-zinc-800"
        style="${isMatch ? 'border-bottom: 3px solid #eaea00;' : ''}">
        <div class="editable-cell text-white font-bold" 
             style="text-transform:uppercase"
             contenteditable="true" 
             onblur="updateEntry(${log.id}, 'zone', this.innerText)">${log.zone}</div>
    </td>
    
    <td class="p-3 text-[16px] font-black leading-none"
        style="${isMatch ? 'border-bottom: 3px solid #eaea00;' : ''}">
        ${log.time}<br>
        <span class="text-[12px] ${log.synced ? 'text-green-500 font-bold' : 'text-white/20'}">
            ${log.synced ? 'SUCCESS ✅' : log.date}
        </span>
    </td>
    
    <td class="p-1">
        <button onclick="deleteEntry(${log.id})" 
                class="w-12 h-12 flex items-center justify-center text-red-500 text-4xl font-bold active:bg-red-500/20 rounded-full">×</button>
  </td>
    </tr>
    `; 
    }).join('');
    // ✅ Scroll vers première occurrence
    setTimeout(() => {
        const firstRow = document.getElementById(`row-${logs[indices[0]].id}`);
        if (firstRow) firstRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 100);
}
    
function validerSaisie() {
    const input = document.getElementById('input-vis');
    const codeClean = input.value.trim().toUpperCase();
    if (/^[A-Z][0-9]{7}$/.test(codeClean)) {
        playScanSound();
        addLogEntry(codeClean);
        document.getElementById('modal-saisie').classList.add('hidden');
        input.value = "";
    } else {
        alert("Format invalide ! (Ex: T5071035)");
    }
}

document.getElementById('input-vis').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') { validerSaisie(); }
});

function addLogEntry(codeValue) {
    // ✅ Plus de blocage si TEMP — on récupère ou on crée
    let user = { id: 'TEMP', nom: 'HORS-LIGNE', prenom: 'MODE' };
    try {
        const userData = localStorage.getItem('StellantisUser');
        if (userData) user = JSON.parse(userData);
    } catch(e) {}

    const now = new Date();
    const dateStr = now.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: '2-digit' });
    const timeStr = now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const entry = {
        id: Date.now(), op: user.id, code: codeValue,
        zone: '', date: dateStr, time: timeStr, synced: false
    };
    logs.unshift(entry);
    localStorage.setItem('lumen_logs', JSON.stringify(logs));
    renderTable();
    setTimeout(() => toggleView('history'), 300);
    setTimeout(() => { isProcessing = false; }, 1500);
}

async function sendToGoogle(entry) {
    if (!navigator.onLine) { console.warn("Hors-ligne : stocké localement."); return; }
    const url = `${GOOGLE_URL}?action=saveScan&op=${encodeURIComponent(entry.op)}&code=${encodeURIComponent(entry.code)}&zone=${encodeURIComponent(entry.zone)}&date=${encodeURIComponent(entry.date)}&time=${encodeURIComponent(entry.time)}`;
    try {
        const response = await fetch(url, { method: 'GET', mode: 'cors' });
        if (response.ok) {
            const logIndex = logs.findIndex(l => l.id === entry.id);
            if (logIndex !== -1) {
                logs[logIndex].synced = true;
                localStorage.setItem('lumen_logs', JSON.stringify(logs));
            }
            renderTable();
        }
    } catch(e) { console.error("Erreur envoi Google Sheets:", e); }
}

async function updateEntry(id, field, val) {
    const i = logs.findIndex(l => l.id === id);
    if (i !== -1) {
        logs[i][field] = val.trim().toUpperCase();
        localStorage.setItem('lumen_logs', JSON.stringify(logs));
        
        if (field === 'zone' && logs[i].zone.length >= 3) {
            // ✅ Toujours envoyer (même si déjà synced) pour corriger
            logs[i].synced = false;
            await sendToGoogle(logs[i]);
        }
    }
}

function renderTable() {
    document.getElementById('flux-title').innerText = `Flux (${logs.length})`;
    document.getElementById('history-body').innerHTML = logs.map(log => `
        <tr class="border-b border-zinc-800 ${log.synced ? 'bg-green-900/10' : ''}">
            <td class="p-3 text-white/30 text-[16px]">${log.op}</td>
            <td class="p-3 border-r border-zinc-800"><div class="editable-cell text-primary font-black" contenteditable="true" style="text-transform:uppercase" oninput="this.innerText = this.innerText.toUpperCase(); const sel = window.getSelection(); sel.collapse(this, 1);" onblur="updateEntry(${log.id}, 'code', this.innerText)">${log.code}</div></td>
            <td class="p-3 border-r border-zinc-800"><div class="editable-cell text-white font-bold" contenteditable="true" style="text-transform:uppercase" onblur="updateEntry(${log.id}, 'zone', this.innerText)">${log.zone}</div></td>
            <td class="p-3 text-[16px] font-black leading-none">
                ${log.time}<br>
                <span class="text-[12px] ${log.synced ? 'text-green-500 font-bold' : 'text-white/20'}">
                    ${log.synced ? 'SUCCESS ✅' : log.date}
                </span>
            </td>
            <td class="p-1">
                <button onclick="deleteEntry(${log.id})" class="w-12 h-12 flex items-center justify-center text-red-500 text-4xl font-bold active:bg-red-500/20 rounded-full transition-colors">×</button>
            </td>
        </tr>
    `).join('');
}

function playScanSound() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(880, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
}

async function toggleTorch() {
    try {
        const track = document.querySelector('#reader video').srcObject.getVideoTracks()[0];
        const caps = track.getCapabilities();
        if (caps.torch) track.applyConstraints({ advanced: [{ torch: !track.getSettings().torch }] });
    } catch (e) { alert("Flash indisponible"); }
}

function toggleView(v) {
    document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden'));
    document.querySelectorAll('nav button').forEach(b => {
        b.classList.add('text-white/20');
        b.classList.remove('active-nav');
    });
    document.getElementById(`view-${v}`).classList.remove('hidden');
    document.getElementById(`nav-${v}`).classList.add('active-nav');
    if (v === 'scanner') { isProcessing = false; if (html5QrCode) html5QrCode.resume(); }
    else { if (html5QrCode) html5QrCode.pause(true); }
}

function deleteEntry(id) {
    if (confirm("Supprimer ?")) {
        logs = logs.filter(l => l.id !== id);
        localStorage.setItem('lumen_logs', JSON.stringify(logs));
        renderTable();
    }
}

function clearAllLogs() {
    if (confirm("PURGE ?")) {
        logs = [];
        localStorage.removeItem('lumen_logs');
        renderTable();
    }
}

function exportCSV() {
    if (logs.length === 0) return alert("Aucune donnée à exporter.");
    
    const now = new Date();
    const dateFile = now.toLocaleDateString('fr-FR', {
        day: '2-digit', month: '2-digit', year: '2-digit'
    }).replace(/\//g, '-');
    const timeFile = now.toLocaleTimeString('fr-FR', {
        hour: '2-digit', minute: '2-digit'
    }).replace(/:/g, 'h');

    // ✅ En-tête + données
    let csv = "OP;CODE VIS;ZONE;DATE;HEURE;STATUT\n";
    logs.forEach(l => {
        const statut = l.synced ? "ENVOYÉ" : "EN ATTENTE";
        csv += `${l.op};${l.code};${l.zone};${l.date};${l.time};${statut}\n`;
    });

    // ✅ Téléchargement
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = `STELLANTIS_MGV_${dateFile}_${timeFile}.csv`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(link.href);
}

if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js').then(reg => {
            console.log('[App] SW enregistré:', reg.scope);
            window.addEventListener('online', () => {
                if ('SyncManager' in window) {
                    reg.sync.register('sync-scans');
                } else {
                    reg.active?.postMessage({ type: 'SYNC_NOW' });
                }
            });
            navigator.serviceWorker.addEventListener('message', e => {
                if (e.data.type === 'SCAN_SYNCED') {
                    logs = JSON.parse(localStorage.getItem('lumen_logs')) || [];
                    renderTable();
                }
            });
        });
    });
}
   </script>

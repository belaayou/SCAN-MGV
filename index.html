<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>MGV SCAN | Stellantis</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; }
        .primary-btn { background: #eaea00; color: #000; font-weight: 900; }
    </style>
</head>
<body class="bg-black text-white flex flex-col min-h-screen">
    <header class="p-5 border-b border-zinc-800 text-center">
        <h1 class="text-[#eaea00] text-2xl font-black italic">MGV SCAN CORE</h1>
    </header>

    <main class="flex-1 p-4 flex flex-col gap-4">
        <div id="reader" class="w-full bg-zinc-900 rounded-xl overflow-hidden" style="min-height: 300px;"></div>
        
        <div class="bg-zinc-900 p-4 rounded-xl border border-zinc-800">
            <input type="text" placeholder="OPÉRATEUR" class="w-full bg-black border border-zinc-700 p-3 mb-2 rounded">
            <input type="number" placeholder="ID CODE" class="w-full bg-black border border-zinc-700 p-3 mb-4 rounded">
            <button class="w-full primary-btn py-4 rounded-xl uppercase tracking-widest">Activer Scanner</button>
        </div>
    </main>

    <nav class="h-20 bg-zinc-950 border-t border-zinc-800 flex justify-around items-center">
        <div class="text-[#eaea00] flex flex-col items-center">
            <span class="text-[10px] font-bold">SCANNER</span>
        </div>
        <div class="text-zinc-600 flex flex-col items-center">
            <span class="text-[10px] font-bold">LOGS</span>
        </div>
    </nav>

    <script>
        function onScanSuccess(decodedText) {
            alert("Code: " + decodedText);
        }
        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>

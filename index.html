<!DOCTYPE html>
<html class="dark" lang="fr">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover" name="viewport"/>
    <title>SCAN_INDUSTRIAL | v7.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&family=Inter:wght@400;900&display=swap" rel="stylesheet"/>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="IMG_20260413_130653.png">
    <meta name="theme-color" content="#EAB308">
    

    
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-capable" content="yes">
    
    <script id="tailwind-config">
      tailwind.config = {
        theme: {
          extend: { 
            colors: { "primary": "#eaea00", "dark-bg": "#000000" },
            fontFamily: { mono: ['"JetBrains Mono"', 'monospace'], sans: ['Inter', 'sans-serif'] }
          },
        },
      }
    </script>
    <style>
     body {
    height: 100svh; 
    margin: 0;
    padding: 0;
    overflow: hidden; 
    display: flex;
    flex-direction: column;
    background: #000000;
}

@supports not (height: 100svh) {
    body {
        height: 100vh;
    }
}

#view-scanner {
    flex: 1;
    position: relative;
    width: 100%;
    overflow: hidden;
}
        { background: #000000; color: #ffffff; font-family: 'Inter', sans-serif; height: 100svh; overflow: hidden; display: flex; flex-direction: column; }
        /* Style pour ton rectangle jaune personnalisé */
.scan-overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 400px; /* Doit être identique au qrbox du script */
    height: 240px; /* Doit être identique au qrbox du script */
    border: 1px solid rgba(234, 234, 0, 0.2);
    z-index: 20;
    pointer-events: none;
}
        
        .corner { position: absolute; width: 30px; height: 30px; border: 5px solid #eaea00; }
        .top-l { top: -5px; left: -5px; border-right: 0; border-bottom: 0; }
        .top-r { top: -5px; right: -5px; border-left: 0; border-bottom: 0; }
        .bot-l { bottom: -5px; left: -5px; border-right: 0; border-top: 0; }
        .bot-r { bottom: -5px; right: -5px; border-left: 0; border-top: 0; }
        .scan-line {
            position: absolute; width: 100%; height: 3px; background: #eaea00;
            box-shadow: 0 0 20px #eaea00; top: 0; animation: scan 2s linear infinite; opacity: 0.8;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        .editable-cell { border-bottom: 1px dashed #444; min-width: 50px; padding: 6px; font-size: 18px; transition: all 0.2s; }
        .editable-cell:focus { outline: none; border-bottom: 2px solid #eaea00; background: rgba(234,234,0,0.15); }
        .active-nav { color: #eaea00 !important; border-top: 3px solid #eaea00; }
    </style>
</head>
<body onload="initApp()">

<div id="identity-screen" class="fixed inset-0 bg-black z-[200] flex flex-col p-8 items-center justify-center">
    <div class="w-full max-sm:max-w-xs">
        <h1 class="text-primary font-[900] text-4xl tracking-tighter mb-2 uppercase italic text-center">LUMEN CORE</h1>
        <div class="space-y-4">
            <input type="text" id="reg-name" class="w-full bg-zinc-900 border-2 border-zinc-800 p-5 rounded-xl outline-none focus:border-primary text-white font-bold uppercase" placeholder="OPÉRATEUR" style="text-align: center;">
            <input type="number" id="reg-id" class="w-full bg-zinc-900 border-2 border-zinc-800 p-5 rounded-xl outline-none focus:border-primary text-primary font-mono text-3xl text-center" placeholder="ID CODE">
        </div>
        <button onclick="saveIdentity()" class="w-full mt-8 bg-primary text-black font-[900] uppercase py-6 rounded-xl tracking-widest text-lg">Activer Terminal</button>
    </div>
</div>

<header class="h-20 flex items-center px-6 shrink-0 bg-black border-b-2 border-zinc-900 z-50">
    <div class="flex flex-col w-1/3">
        <span id="display-name" class="text-xs font-[900] tracking-widest text-primary uppercase leading-tight">---</span>
        <span id="display-id" class="text-[16px] font-mono text-white/80 font-bold tracking-tighter">ID: ---</span>
    </div>

    <div class="flex justify-center w-1/3">
        <button onclick="toggleView('scanner')" class="text-primary hover:scale-110 transition-transform">
            <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h3m-3-3H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
        </button>
    </div>

    <div class="flex justify-end w-1/3">
        <button onclick="logoutIdentity()" class="text-red-600 hover:scale-110 transition-transform">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
            </svg>
        </button>
    </div>
</header>

<main class="flex-1 flex flex-col overflow-hidden relative">
    
    <section id="view-scanner" class="view-section flex-1 flex flex-col">
        <div class="relative flex-1 bg-zinc-950 overflow-hidden">
            <div id="reader" class="h-full"></div>
            <div class="scan-overlay">
                <div class="scan-line"></div>
                <div class="corner top-l"></div><div class="corner top-r"></div>
                <div class="corner bot-l"></div><div class="corner bot-r"></div>
            </div>
        </div>
    </section>

    <section id="view-history" class="view-section hidden flex-1 p-2 overflow-y-auto">
        <div class="flex justify-between items-center mb-4 px-2">
            <h3 id="flux-title" class="text-primary font-[900] text-sm uppercase tracking-widest italic">Flux (0)</h3>
            <div class="flex gap-2">
                <button onclick="clearAllLogs()" class="bg-red-900/20 border border-red-500/30 text-red-500 px-3 py-1 rounded font-black text-[18px] uppercase italic">Purger</button>
                <button onclick="exportCSV()" class="bg-zinc-800 px-3 py-1 rounded font-black text-[18px] uppercase text-white italic">CSV</button>
            </div>
        </div>
        <div class="bg-zinc-900 rounded-xl overflow-x-auto border-2 border-zinc-800">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-zinc-800 text-[16px] text-white/40 uppercase font-black">
                        <th class="p-3">OP</th><th class="p-3">Code</th><th class="p-3">Zone</th><th class="p-3">H/D</th><th class="p-3">X</th>
                    </tr>
                </thead>
                <tbody id="history-body" class="font-mono"></tbody>
            </table>
        </div>
    </section>

    <div class="px-8 py-4 bg-black border-t border-zinc-900/50">
        <button disabled class="w-full bg-primary text-black py-6 flex items-center justify-center gap-4 rounded-2xl cursor-default shadow-[0_10px_20px_rgba(234,234,0,0.15)]">
            <svg class="w-8 h-8 text-black" fill="currentColor" viewBox="0 0 24 24"><path d="M3 4h2v16H3V4zm4 0h1v16H7V4zm3 0h3v16h-3V4zm5 0h2v16h-2V4zm4 0h2v16h-2V4z"/></svg>
            <span class="font-[800] uppercase tracking-[0.2em] text-xl text-black">STELLANTIS MGV</span>
        </button>
    </div>

</main>

<nav class="h-20 bg-black border-t-2 border-zinc-900 flex justify-around items-center z-[100] pb-2 shrink-0">
    <button onclick="toggleView('scanner')" id="nav-scanner" class="active-nav flex flex-col items-center p-2 w-1/2">
        <svg class="w-8 h-8 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h3m-3-3H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <span class="text-[16px] font-black uppercase tracking-widest">Scanner</span>
    </button>
    <button onclick="toggleView('history')" id="nav-history" class="text-white/20 flex flex-col items-center p-2 w-1/2">
        <svg class="w-8 h-8 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2 1 3 3 3h10c2 0 3-1 3-3V7c0-2-1-3-3-3H7C5 4 4 5 4 7z"></path></svg>
        <span class="text-[16px] font-black uppercase tracking-widest">Mémoire</span>
    </button>
</nav>

<script>
    window.addEventListener('resize', () => {
        document.body.style.height = window.innerHeight + 'px';
    });

    let html5QrCode;
    let isProcessing = false;
    let logs = JSON.parse(localStorage.getItem('lumen_logs')) || [];
    let audioCtx = null;

    // --- CONFIGURATION GOOGLE SHEETS ---
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxH9sh-fmBAx2FjyF6hS97F1IxwB7PGU4HHV9y7z2cBgQw_L2Qe_Yhu-t5kvNP0hEmO/exec";

    function playScanSound(type = 'success') {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        if(type === 'success') { oscillator.type = 'square'; oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); }
        else { oscillator.type = 'sawtooth'; oscillator.frequency.setValueAtTime(110, audioCtx.currentTime); }
        gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        oscillator.connect(gainNode); gainNode.connect(audioCtx.destination);
        oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.1);
    }

    function initApp() {
        const user = JSON.parse(localStorage.getItem('lumen_user'));
        if (user) {
            document.getElementById('identity-screen').style.display = 'none';
            document.getElementById('display-name').innerText = user.name;
            document.getElementById('display-id').innerText = `ID: ${user.id}`;
            renderTable(); startScanner();
        }
    }

    function saveIdentity() {
        const nameInput = document.getElementById('reg-name');
        const idInput = document.getElementById('reg-id');
        const name = nameInput.value.trim();
        const id = idInput.value.trim();
        
        if (name && id) {
            localStorage.setItem('lumen_user', JSON.stringify({name, id}));
            document.getElementById('display-name').innerText = name;
            document.getElementById('display-id').innerText = "ID: " + id;
            document.getElementById('identity-screen').style.display = 'none';
            renderTable();
            startScanner();
        } else {
            nameInput.style.borderColor = name ? '#27272a' : '#eaea00';
            idInput.style.borderColor = id ? '#27272a' : '#eaea00';
        }
    }

    function startScanner() {
    html5QrCode = new Html5Qrcode("reader");
    
    const config = { 
        fps: 20, 
        qrbox: { width: 400, height: 160 } 
    };

    html5QrCode.start(
        { facingMode: "environment" }, 
        config, 
        (decodedText) => {
            if (isProcessing) return;

            // Nettoyage de la chaîne (enlève les espaces/retours à la ligne)
            const cleanText = decodedText.trim().toUpperCase();

            // Filtre VIS Stellantis (1 lettre + 7 chiffres)
            if (/^[A-Z][0-9]{7}$/.test(cleanText)) {
                isProcessing = true;
                playScanSound('success'); // Utilise le nom correct de votre fonction
                html5QrCode.pause(true);
                addLogEntry(cleanText);
            } else {
                // Optionnel : un retour visuel ou sonore si le code ne respecte pas le format
                console.log("Format invalide : " + cleanText);
            }
        }
    ).catch(err => {
        console.error("Erreur de démarrage du scanner:", err);
    });
                    }
    

    async function addLogEntry(codeValue) {
    const user = JSON.parse(localStorage.getItem('lumen_user'));
    const now = new Date();
    const dateStr = `${now.getDate()}/${now.getMonth() + 1}`;
    const timeStr = now.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
    
    const entry = { 
        id: Date.now(), 
        op: user.id, 
        code: codeValue, 
        zone: '', // Vide au départ
        date: dateStr, 
        time: timeStr,
        synced: false 
    };

    logs.unshift(entry);
    localStorage.setItem('lumen_logs', JSON.stringify(logs));
    
    renderTable(); 
    toggleView('history');

    // Focus sur la zone pour saisie manuelle
    setTimeout(() => { 
        const cells = document.querySelectorAll('.editable-cell');
        if(cells[1]) { 
            cells[1].focus(); 
        }
    }, 400);
    
    // NOTE : On n'appelle plus sendToGoogle ici !
}

    async function sendToGoogle(entry) {
        try {
            await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(entry)
            });
            entry.synced = true;
            localStorage.setItem('lumen_logs', JSON.stringify(logs));
            renderTable();
        } catch (e) {
            console.warn("Synchro en attente...");
        }
    }

    window.addEventListener('online', () => {
        logs.forEach(entry => {
            if (!entry.synced) sendToGoogle(entry);
        });
    });

    function renderTable() {
        document.getElementById('flux-title').innerText = `Flux (${logs.length})`;
        document.getElementById('history-body').innerHTML = logs.map(log => `
            <tr class="border-b border-zinc-800 ${log.synced ? 'bg-green-900/5' : ''}">
                <td class="p-3 text-white/30 text-[16px]">${log.op}</td>
                <td class="p-3 border-r border-zinc-800"><div class="editable-cell text-primary font-black" contenteditable="true" onblur="updateEntry(${log.id}, 'code', this.innerText)">${log.code}</div></td>
                <td class="p-3 border-r border-zinc-800"><div class="editable-cell text-white font-bold" contenteditable="true" onblur="updateEntry(${log.id}, 'zone', this.innerText)">${log.zone}</div></td>
                <td class="p-3 text-[16px] font-black leading-none">
                    ${log.time}<br>
                    <span class="text-[16px] ${log.synced ? 'text-green-500' : 'text-white/20'}">
                        ${log.synced ? 'SYNCHRONISÉ ✅' : log.date}
                    </span>
                </td>
                <td class="p-1"><button onclick="deleteEntry(${log.id})" class="text-red-900 font-bold text-xl px-2">×</button></td>
            </tr>
        `).join('');
    }

    async function updateEntry(id, field, val) {
    const i = logs.findIndex(l => l.id === id);
    if (i !== -1) {
        logs[i][field] = val.trim();
        localStorage.setItem('lumen_logs', JSON.stringify(logs));
        
        // CONDITION : On envoie à Google seulement si la ZONE est remplie
        // et que le code n'est pas déjà synchronisé.
        if (field === 'zone' && logs[i].zone !== '' && !logs[i].synced) {
            if (navigator.onLine) {
                sendToGoogle(logs[i]);
            }
        }
    }
}

    function deleteEntry(id) { if(confirm("Supprimer ?")) { logs = logs.filter(l => l.id !== id); localStorage.setItem('lumen_logs', JSON.stringify(logs)); renderTable(); } }

    function clearAllLogs() { if(confirm("⚠️ PURGE ?")) { logs = []; localStorage.removeItem('lumen_logs'); renderTable(); } }

    function toggleView(v) {
        document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden'));
        document.querySelectorAll('nav button').forEach(b => { b.classList.add('text-white/20'); b.classList.remove('active-nav'); });
        document.getElementById(`view-${v}`).classList.remove('hidden');
        document.getElementById(`nav-${v}`).classList.add('active-nav');
        if (v === 'scanner' && html5QrCode) { isProcessing = false; html5QrCode.resume(); }
    }

    function exportCSV() {
        if(logs.length === 0) return;
        let csv = "\uFEFFOP;CODE;ZONE;DATE;TIME\n";
        logs.forEach(l => csv += `${l.op};${l.code};${l.zone};${l.date};${l.time}\n`);
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `LUMEN_EXPORT.csv`; link.click();
    }

    function logoutIdentity() { if(confirm("Quitter ?")) { localStorage.removeItem('lumen_user'); location.reload(); } }

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./service-worker.js')
                .then(reg => console.log('SW Ready'))
                .catch(err => console.error('SW Error', err));
        });
    }
</script>
    
</body>
</html>

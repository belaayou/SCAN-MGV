<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>MGV SCAN | Stellantis</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    </style>
</head>
<body class="flex flex-col h-screen" onload="initApp()">
    <header class="p-5 border-b border-zinc-800 flex justify-between items-center bg-black">
        <h1 class="text-[#eaea00] text-2xl font-black italic">MGV SCAN CORE</h1>
    </header>

    <main class="flex-1 relative bg-zinc-950 p-4">
        <div id="reader" class="w-full bg-zinc-900 rounded-2xl border border-zinc-800 overflow-hidden" style="min-height: 250px;"></div>
        
        <div class="mt-4 bg-zinc-900 p-5 rounded-2xl border border-zinc-800">
            <input type="text" placeholder="OPÉRATEUR" class="w-full bg-black border border-zinc-700 p-4 mb-3 rounded-xl">
            <input type="number" placeholder="ID CODE" class="w-full bg-black border border-zinc-700 p-4 mb-5 rounded-xl font-mono text-xl text-center">
            <button class="w-full bg-[#eaea00] text-black font-black py-5 rounded-xl uppercase tracking-widest text-lg">Commencer Scan</button>
        </div>
    </main>
    <script>
        // تسجيل الـ Service Worker لتمكين التثبيت كتطبيق
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(() => console.log("SW Registered"));
        }
    </script>
</body>
</html>

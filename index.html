<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MGV SCAN CORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-black text-white font-sans">
    <div class="p-6 text-center border-b border-zinc-800">
        <h1 class="text-[#eaea00] text-3xl font-black">MGV SCAN</h1>
    </div>
    
    <div class="p-4 flex flex-col items-center gap-6">
        <div id="reader" class="w-full max-w-sm rounded-3xl overflow-hidden bg-zinc-900 border border-zinc-700"></div>
        
        <div class="w-full max-w-sm bg-zinc-900 p-6 rounded-3xl border border-zinc-800 shadow-xl">
            <input type="text" placeholder="NOM OPÉRATEUR" class="w-full bg-black border border-zinc-700 p-4 mb-4 rounded-xl text-[#eaea00] outline-none">
            <button onclick="location.reload()" class="w-full bg-[#eaea00] text-black font-bold py-5 rounded-xl uppercase tracking-tighter text-xl">Démarrer Scanner</button>
        </div>
    </div>

    <script>
        function onScanSuccess(decodedText) {
            alert("Code Scanné: " + decodedText);
        }
        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>

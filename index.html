<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUMEN CORE - Stellantis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { --vh: 1vh; }
        body {
            height: 100vh;
            height: calc(var(--vh, 1vh) * 100);
            margin: 0; padding: 0; overflow: hidden;
            display: flex; flex-direction: column;
            background: #000; color: #fff; font-family: 'Inter', sans-serif;
            position: fixed; width: 100%;
        }

        /* Scan UI */
        #reader { width: 100% !important; height: 100% !important; object-fit: cover; }
        #reader video { object-fit: cover !important; }
        
        .scan-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; height: 140px; border: 1px solid rgba(234, 234, 0, 0.2);
            z-index: 20; pointer-events: none;
        }
        .corner { position: absolute; width: 25px; height: 25px; border: 4px solid #eaea00; }
        .top-l { top: -4px; left: -4px; border-right: 0; border-bottom: 0; }
        .top-r { top: -4px; right: -4px; border-left: 0; border-bottom: 0; }
        .bot-l { bottom: -4px; left: -4px; border-right: 0; border-top: 0; }
        .bot-r { bottom: -4px; right: -4px; border-left: 0; border-top: 0; }

        .scan-line {
            position: absolute; width: 100%; height: 2px; background: #eaea00;
            box-shadow: 0 0 15px #eaea00; top: 0; animation: scan 2s linear infinite;
        }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }

        /* Table UI */
        .editable-cell { border-bottom: 1px dashed #444; min-width: 60px; padding: 8px; font-size: 18px; }
        .editable-cell:focus { outline: none; border-bottom: 2px solid #eaea00; background: rgba(234,234,0,0.1); }
        .active-nav { color: #eaea00 !important; border-top: 3px solid #eaea00; }
        .hidden { display: none !important; }
        
        #torch-btn { transition: all 0.2s ease; }
    </style>
</head>
<body>

<div id="identity-screen" class="fixed inset-0 bg-black z-[200] flex flex-col p-8 items-center justify-center text-center">
    <div class="w-full max-w-xs">
        <h1 class="text-[#eaea00] font-[900] text-5xl tracking-tighter mb-8 italic">LUMEN CORE</h1>
        <div class="space-y-4">
            <input type="text" id="reg-name" class="w-full bg-zinc-900 border-2 border-zinc-800 p-5 rounded-2xl outline-none focus:border-[#eaea00] text-white font-bold uppercase text-center" placeholder="OPÉRATEUR">
            <input type="number" id="reg-id" class="w-full bg-zinc-900 border-2 border-zinc-800 p-5 rounded-2xl outline-none focus:border-[#eaea00] text-[#eaea00] font-mono text-4xl text-center" placeholder="ID">
        </div>
        <button onclick="saveIdentity()" class="w-full mt-10 bg-[#eaea00] text-black font-[900] uppercase py-6 rounded-2xl tracking-widest text-xl active:scale-95 transition-transform">Activer Terminal</button>
    </div>
</div>

<header class="h-20 flex justify-between items-center px-6 shrink-0 bg-black border-b-2 border-zinc-900 z-50">
    <div class="flex flex-col flex-1">
        <span id="display-name" class="text-[10px] font-[900] tracking-widest text-[#eaea00] uppercase leading-tight">---</span>
        <span id="display-id" class="text-[22px] font-mono text-white font-bold tracking-tighter">ID: ---</span>
    </div>
    
    <div class="flex justify-center flex-1">
        <button id="torch-btn" onclick="toggleTorch()" class="text-zinc-600 p-2">
            <svg class="w-11 h-11" fill="currentColor" viewBox="0 0 24 24">
                <path d="M13 10V3L4 14h7v7l9-11h-7z"></path>
            </svg>
        </button>
    </div>

    <div class="flex-1"></div>
</header>

<main class="flex-1 relative overflow-hidden">
    <section id="view-scanner" class="view-section absolute inset-0">
        <div id="reader"></div>
        <div class="scan-overlay">
            <div class="corner top-l"></div><div class="corner top-r"></div>
            <div class="corner bot-l"></div><div class="corner bot-r"></div>
            <div class="scan-line"></div>
        </div>
        <div class="absolute bottom-8 w-full px-8 z-30">
             <div class="bg-black/60 backdrop-blur-md border border-white/10 py-4 rounded-2xl text-center">
                 <p class="text-[#eaea00] font-black tracking-[0.2em] text-xs uppercase">Stellantis MGV</p>
             </div>
        </div>
    </section>

    <section id="view-history" class="view-section hidden absolute inset-0 overflow-auto bg-zinc-950">
        <div class="p-5 border-b border-zinc-900 sticky top-0 bg-black z-10 flex justify-between items-center">
            <h2 id="flux-title" class="font-black text-2xl italic text-white">FLUX (0)</h2>
            <span class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest">Temps Réel</span>
        </div>
        <table class="w-full text-left border-collapse">
            <tbody id="history-body"></tbody>
        </table>
    </section>
</main>

<nav class="h-20 bg-black border-t-2 border-zinc-900 flex shrink-0 z-50">
    <button id="nav-scanner" onclick="toggleView('scanner')" class="flex-1 flex flex-col items-center justify-center active-nav">
        <svg class="w-7 h-7 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path></svg>
        <span class="text-[10px] font-bold uppercase tracking-widest">Scanner</span>
    </button>
    <button id="nav-history" onclick="toggleView('history')" class="flex-1 flex flex-col items-center justify-center text-zinc-700">
        <svg class="w-7 h-7 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
        <span class="text-[10px] font-bold uppercase tracking-widest">Mémoire</span>
    </button>
</nav>

<script>
    let html5QrCode;
    let isProcessing = false;
    let torchEnabled = false;
    let logs = JSON.parse(localStorage.getItem('lumen_logs')) || [];
    const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbxH9sh-fmBAx2FjyF6hS97F1IxwB7PGU4HHV9y7z2cBgQw_L2Qe_Yhu-t5kvNP0hEmO/exec";

    // GESTION ECRAN MOBILE
    function updateFullHeight() {
        let vh = window.innerHeight * 0.01;
        document.documentElement.style.setProperty('--vh', `${vh}px`);
        document.body.style.height = window.innerHeight + 'px';
    }
    window.addEventListener('resize', updateFullHeight);
    updateFullHeight();

    // IDENTITÉ
    function saveIdentity() {
        const name = document.getElementById('reg-name').value.trim();
        const id = document.getElementById('reg-id').value.trim();
        if(name && id) {
            localStorage.setItem('lumen_user', JSON.stringify({name, id}));
            initApp();
        }
    }

    function initApp() {
        const user = JSON.parse(localStorage.getItem('lumen_user'));
        if(user) {
            document.getElementById('identity-screen').classList.add('hidden');
            document.getElementById('display-name').innerText = user.name;
            document.getElementById('display-id').innerText = `ID: ${user.id}`;
            renderTable();
            startScanner();
        }
    }

    // SCANNER & FLASH
    function startScanner() {
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, 
        { fps: 20, qrbox: { width: 400, height: 130 } }, 
        (decodedText) => {
            if (isProcessing) return;
            isProcessing = true;
            addLogEntry(decodedText);
        });
    }

    async function toggleTorch() {
        try {
            const videoTrack = html5QrCode.getRunningTrack();
            if (!videoTrack) return;
            const capabilities = videoTrack.getCapabilities();
            if (capabilities.torch) {
                torchEnabled = !torchEnabled;
                await videoTrack.applyConstraints({ advanced: [{ torch: torchEnabled }] });
                const btn = document.getElementById('torch-btn');
                btn.style.color = torchEnabled ? "#eaea00" : "#52525b";
                btn.style.filter = torchEnabled ? "drop-shadow(0 0 10px #eaea00)" : "none";
            }
        } catch (e) { console.error(e); }
    }

    // LOGS & NAVIGATION
    function toggleView(v) {
        document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden'));
        document.getElementById(`view-${v}`).classList.remove('hidden');
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav', 'text-[#eaea00]'));
        document.getElementById(`nav-${v}`).classList.add('active-nav');
        if(v === 'scanner') { isProcessing = false; html5QrCode.resume(); }
    }

    function addLogEntry(code) {
        const user = JSON.parse(localStorage.getItem('lumen_user'));
        const now = new Date();
        const entry = {
            id: Date.now(), op: user.id, code: code, zone: '',
            time: now.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}),
            date: `${now.getDate()}/${now.getMonth()+1}`, synced: false
        };
        logs.unshift(entry);
        localStorage.setItem('lumen_logs', JSON.stringify(logs));
        renderTable();
        toggleView('history');
        setTimeout(() => {
            const cells = document.querySelectorAll('.editable-cell');
            if(cells[1]) { cells[1].focus(); document.execCommand('selectAll', false, null); }
        }, 400);
    }

    async function updateEntry(id, field, val) {
        const i = logs.findIndex(l => l.id === id);
        if(i !== -1) {
            logs[i][field] = val.trim();
            localStorage.setItem('lumen_logs', JSON.stringify(logs));
            if(field === 'zone' && logs[i].zone !== '' && !logs[i].synced) {
                if(navigator.onLine) sendToGoogle(logs[i]);
            }
        }
    }

    async function sendToGoogle(entry) {
        try {
            await fetch(GOOGLE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(entry) });
            entry.synced = true;
            localStorage.setItem('lumen_logs', JSON.stringify(logs));
            renderTable();
        } catch(e) { console.log("Offline"); }
    }

    function deleteEntry(id) {
        if(confirm("Supprimer ?")) {
            logs = logs.filter(l => l.id !== id);
            localStorage.setItem('lumen_logs', JSON.stringify(logs));
            renderTable();
        }
    }

    function renderTable() {
        document.getElementById('flux-title').innerText = `FLUX (${logs.length})`;
        document.getElementById('history-body').innerHTML = logs.map(log => `
            <tr class="border-b border-zinc-900 ${log.synced ? 'bg-green-900/5' : ''}">
                <td class="p-4 text-zinc-600 font-mono text-xs">${log.op}</td>
                <td class="p-4 border-r border-zinc-900">
                    <div class="editable-cell text-[#eaea00] font-black" contenteditable="true" onblur="updateEntry(${log.id}, 'code', this.innerText)">${log.code}</div>
                </td>
                <td class="p-4 border-r border-zinc-900">
                    <div class="editable-cell text-white font-bold" contenteditable="true" onblur="updateEntry(${log.id}, 'zone', this.innerText)">${log.zone}</div>
                </td>
                <td class="p-4 text-xs font-black">
                    ${log.time}<br><span class="${log.synced ? 'text-green-500' : 'text-zinc-700'}">${log.synced ? 'SYNCHRO' : log.date}</span>
                </td>
                <td class="p-2"><button onclick="deleteEntry(${log.id})" class="text-red-900 font-bold text-2xl">×</button></td>
            </tr>
        `).join('');
    }

    window.onload = initApp;
</script>
</body>
    </html>
